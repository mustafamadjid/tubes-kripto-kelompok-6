{% extends "base.html" %}
{% block content %}
<main class="center-stage">
  <section class="panel narrow">
    <p class="eyebrow">Vote Recorded</p>
    <span class="status-chip status-success">Encrypted and saved</span>
    <h1>Suara berhasil disimpan</h1>
    <p class="muted">Vote ID</p>
    <code class="code-block">{{ vote_id }}</code>
    <p>Data suara sudah melalui RSA-OAEP, SHA-256, dan RSA-PSS sebelum tersimpan.</p>
    <a class="button button-primary" href="/login">Kembali</a>
  </section>
</main>
{% endblock %}
