{% extends "base.html" %} {% block content %}
<main class="auth-layout auth-layout-centered">
  <section class="auth-card">
    <p class="eyebrow">Voter Portal</p>
    <h1>Masuk sebagai pemilih</h1>
    <p class="lede">
      Gunakan NIM terdaftar untuk masuk ke ballot. Setiap pemilih hanya dapat
      mengirim satu suara.
    </p>
    <form class="form-stack" method="post" action="/login">
      {% if error %}
      <p class="alert">{{ error }}</p>
      {% endif %}
      <label
        >NIM<input
          name="nim"
          inputmode="numeric"
          autocomplete="username"
          placeholder="122140191"
          required
      /></label>
      <label
        >Password<input
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="password123"
          required
      /></label>
      <button class="button button-primary" type="submit">
        Masuk ke ballot
      </button>
    </form>
  </section>
</main>
{% endblock %}
