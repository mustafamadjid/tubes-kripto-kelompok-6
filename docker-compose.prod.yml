services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "true"
      GENERATE_KEYS_IF_MISSING: "true"
      ADMIN_PRIVATE_KEY_PATH: /data/keys/admin_private_key.pem
      ADMIN_PUBLIC_KEY_PATH: /data/keys/admin_public_key.pem
      SYSTEM_PRIVATE_KEY_PATH: /data/keys/system_private_key.pem
      SYSTEM_PUBLIC_KEY_PATH: /data/keys/system_public_key.pem
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - rsa_keys:/data/keys
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/login', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  rsa_keys:
